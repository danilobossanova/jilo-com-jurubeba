# ==========================================
# Profile: Dev-MySQL
# ==========================================

spring.application.name=jilocomjurubeba

spring.datasource.url=jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:jilocomjurubeba}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
spring.datasource.username=${DB_USER:jilocomjurubeba}
spring.datasource.password=${DB_PASSWORD:jilocomjurubeba123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Porta padrao em desenvolvimento local
server.port=8080

# Segredo para assinar tokens JWT (DEV= pode ser fixo PROD= sempre via env var)
security.jwt.secret=Z5Km3kKvn4wRyK5t7iyW0Xn4AfFY8KpHkDy5FS3o8l0=

security.jwt.expiration-ms=86400000

# Flyway para MySQL
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/mysql
spring.flyway.baseline-on-migrate=true
spring.flyway.placeholders.master_password_hash=${MASTER_PASSWORD_HASH}

# =======================
#  JPA / Hibernate
# =======================

# Formata SQL no log
spring.jpa.properties.hibernate.format_sql=true

# DEV pode usar update sem medo
spring.jpa.hibernate.ddl-auto=validate

# Dialeto do MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# =======================
#  DevTools
# =======================

# Reinicio automatico ao salvar arquivos
spring.devtools.restart.enabled=true

# LiveReload ligado
spring.devtools.livereload.enabled=true

# Permite que devtools injete propriedades extras (ok em dev)
spring.devtools.add-properties=true


# =======================
#  Logging
# =======================

# Log da aplicacao em nivel DEBUG
logging.level.com.restaurantefiap=DEBUG

# Log das queries do Hibernate
logging.level.org.hibernate.SQL=DEBUG

# Log dos valores bindados
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
