# Banco H2 em memória
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JPA cria as tabelas automaticamente
spring.jpa.hibernate.ddl-auto=create-drop

# Flyway desabilitado
spring.flyway.enabled=false

# Script de dados roda DEPOIS que o JPA criar as tabelas
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# Garante que o JPA inicializa antes do script SQL
spring.jpa.defer-datasource-initialization=true

