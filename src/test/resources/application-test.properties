spring.config.activate.on-profile=test

# Banco H2 em memoria
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JPA cria as tabelas automaticamente
spring.jpa.hibernate.ddl-auto=create-drop

# Flyway desabilitado
spring.flyway.enabled=false

# Dados iniciais sao semeados pelo TipoUsuarioDataSeeder (CommandLineRunner)
spring.sql.init.mode=never

# JWT para testes
security.jwt.secret=chave-secreta-para-testes-deve-ter-pelo-menos-32-caracteres-aqui
security.jwt.expiration-minutes=60

# Desativa user default do Spring Security
spring.security.user.name=
spring.security.user.password=
