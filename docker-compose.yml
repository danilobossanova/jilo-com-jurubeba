# ==========================================
# Docker Compose - jilo-com-jurubeba
# ==========================================
services:

  # =======================
  #  Database (MySQL)
  # =======================
  mysql:
    image: mysql:8.0
    container_name: jurubeba_mysql

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-jilocomjurubeba}
      MYSQL_USER: ${MYSQL_USER:-jilocomjurubeba}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-jilocomjurubeba123}

    ports:
      - "3307:3306"

    command: --default-authentication-plugin=mysql_native_password

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - app-net


  # =======================
  #  API (Spring Boot)
  # =======================
  api:
    build: .
    container_name: jurubeba_api

    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-jilocomjurubeba}
      DB_USER: ${MYSQL_USER:-jilocomjurubeba}
      DB_PASSWORD: ${MYSQL_PASSWORD:-jilocomjurubeba123}

      JWT_SECRET: ${JWT_SECRET:-change-me-in-dev}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1440}
      MASTER_PASSWORD_HASH: ${MASTER_PASSWORD_HASH:-$$2a$$10$$Xsx0MV.lnEBwSXtBwC11xuu1D.PXvwOg663hgi/KUV7E73GKBcsfy}

      SERVER_PORT: 8080

      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}

      JPA_SHOW_SQL: ${JPA_SHOW_SQL:-true}
      JPA_FORMAT_SQL: ${JPA_FORMAT_SQL:-true}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}

      DEVTOOLS_ENABLED: ${DEVTOOLS_ENABLED:-false}
      DEVTOOLS_LIVERELOAD: ${DEVTOOLS_LIVERELOAD:-false}

    ports:
      - "${SERVER_PORT:-8080}:8080"

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    depends_on:
      mysql:
        condition: service_healthy

    networks:
      - app-net


volumes:
  mysql_data:

networks:
  app-net:
    driver: bridge
